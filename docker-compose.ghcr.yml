# Pull with: IMAGE_TAG=<git-sha> GHCR_OWNER=<github-user-lowercase>
# CI also uses docker-compose.ci.yml (1 article replica).
services:
  article-service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/happyheadlines-article-service:${IMAGE_TAG}

  comment-service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/happyheadlines-comment-service:${IMAGE_TAG}

  profanity-service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/happyheadlines-profanity-service:${IMAGE_TAG}

  draft-service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/happyheadlines-draft-service:${IMAGE_TAG}

  publisher-service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/happyheadlines-publisher-service:${IMAGE_TAG}

  newsletter-service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/happyheadlines-newsletter-service:${IMAGE_TAG}

  subscriber-service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/happyheadlines-subscriber-service:${IMAGE_TAG}
