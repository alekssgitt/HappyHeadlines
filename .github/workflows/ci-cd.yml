name: HappyHeadlines CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - ArticleService/ArticleService.csproj
          - CommentService/CommentService.csproj
          - ProfanityService/ProfanityService.csproj
          - DraftService/DraftService.csproj
          - PublisherService/PublisherService.csproj
          - NewsletterService/NewsletterService.csproj
          - SubscriberService/SubscriberService.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ matrix.project }} --configuration Release --no-build -o /tmp/publish

  docker-delivery:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ArticleService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ArticleService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happyheadlines-article-service:latest

      - name: Build and push CommentService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CommentService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happyheadlines-comment-service:latest

      - name: Build and push ProfanityService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ProfanityService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happyheadlines-profanity-service:latest

      - name: Build and push DraftService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: DraftService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happyheadlines-draft-service:latest

      - name: Build and push PublisherService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: PublisherService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happyheadlines-publisher-service:latest

      - name: Build and push NewsletterService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: NewsletterService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happyheadlines-newsletter-service:latest

      - name: Build and push SubscriberService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: SubscriberService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/happyheadlines-subscriber-service:latest
