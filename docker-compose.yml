services:
  article-db-africa:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-africa-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  article-db-antarctica:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-antarctica-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  article-db-asia:
    image: postgres:16-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-asia-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  article-db-europe:
    image: postgres:16-alpine
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-europe-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  article-db-north-america:
    image: postgres:16-alpine
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-north-america-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  article-db-south-america:
    image: postgres:16-alpine
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-south-america-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  article-db-oceania:
    image: postgres:16-alpine
    ports:
      - "5439:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-oceania-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  article-db-global:
    image: postgres:16-alpine
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: articles
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - article-db-global-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5




  article-service:
    build:
      context: .
      dockerfile: ArticleService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Cache__ArticleRedis=article-cache:6379
      - Monitoring__Seq__ServerUrl=http://seq:5341
      - Monitoring__Zipkin__Endpoint=http://zipkin:9411/api/v2/spans
    deploy:
      replicas: 3
    depends_on:
      article-db-africa:
        condition: service_healthy
      article-db-antarctica:
        condition: service_healthy
      article-db-asia:
        condition: service_healthy
      article-db-europe:
        condition: service_healthy
      article-db-north-america:
        condition: service_healthy
      article-db-south-america:
        condition: service_healthy
      article-db-oceania:
        condition: service_healthy
      article-db-global:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      article-cache:
        condition: service_started
      seq:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - happyheadlines-net



  load-balancer:
    build:
      context: .
      dockerfile: LoadBalancer/Dockerfile
    ports:
      - "5006:80"
    depends_on:
      - article-service
    networks:
      - happyheadlines-net


  profanity-db:
    image: postgres:16-alpine
    ports:
      - "5441:5432"
    environment:
      POSTGRES_DB: profanity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - profanity-db-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  profanity-service:
    build:
      context: .
      dockerfile: ProfanityService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5002:8080"
    depends_on:
      profanity-db:
        condition: service_healthy
    networks:
      - happyheadlines-net

  comment-db:
    image: postgres:16-alpine
    ports:
      - "5442:5432"
    environment:
      POSTGRES_DB: comments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - comment-db-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  comment-service:
    build:
      context: .
      dockerfile: CommentService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Cache__CommentRedis=comment-cache:6379
    ports:
      - "5001:8080"
    depends_on:
      comment-db:
        condition: service_healthy
      comment-cache:
        condition: service_started
    networks:
      - happyheadlines-net

  draft-db:
    image: postgres:16-alpine
    ports:
      - "5443:5432"
    environment:
      POSTGRES_DB: drafts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - draft-db-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  draft-service:
    build:
      context: .
      dockerfile: DraftService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Monitoring__Seq__ServerUrl=http://seq:5341
      - Monitoring__Zipkin__Endpoint=http://zipkin:9411/api/v2/spans
    ports:
      - "5003:8080"
    depends_on:
      draft-db:
        condition: service_healthy
      seq:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - happyheadlines-net

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "5341:5341"
      - "8081:80"
    volumes:
      - seq-data:/data
    networks:
      - happyheadlines-net

  zipkin:
    image: openzipkin/zipkin:latest
    ports:
      - "9411:9411"
    networks:
      - happyheadlines-net

  article-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - happyheadlines-net

  comment-cache:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - happyheadlines-net

  prometheus:
    build:
      context: .
      dockerfile: Common.Shared/Monitoring/Prometheus/Dockerfile
    ports:
      - "9090:9090"
    depends_on:
      - article-service
      - comment-service
    networks:
      - happyheadlines-net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - happyheadlines-net

  publisher-service:
    build:
      context: .
      dockerfile: PublisherService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Queue__Host=rabbitmq
      - Monitoring__Seq__ServerUrl=http://seq:5341
      - Monitoring__Zipkin__Endpoint=http://zipkin:9411/api/v2/spans
    ports:
      - "5004:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - happyheadlines-net

  newsletter-service:
    build:
      context: .
      dockerfile: NewsletterService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Queue__Host=rabbitmq
      - Queue__SubscriberQueueName=subscriber-queue
      - ArticleService__BaseUrl=http://load-balancer
      - SubscriberService__BaseUrl=http://subscriber-service
      - Monitoring__Seq__ServerUrl=http://seq:5341
      - Monitoring__Zipkin__Endpoint=http://zipkin:9411/api/v2/spans
    ports:
      - "5005:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
      zipkin:
        condition: service_started
      load-balancer:
        condition: service_started
      subscriber-service:
        condition: service_started
    networks:
      - happyheadlines-net

  subscriber-db:
    image: postgres:16-alpine
    ports:
      - "5444:5432"
    environment:
      POSTGRES_DB: subscribers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - subscriber-db-data:/var/lib/postgresql/data
    networks:
      - happyheadlines-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  subscriber-service:
    build:
      context: .
      dockerfile: SubscriberService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Queue__Host=rabbitmq
      - Monitoring__Seq__ServerUrl=http://seq:5341
      - Monitoring__Zipkin__Endpoint=http://zipkin:9411/api/v2/spans
      - ReleaseToggles__SubscriberServiceEnabled=true
    ports:
      - "5007:8080"
    depends_on:
      subscriber-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
      zipkin:
        condition: service_started
    networks:
      - happyheadlines-net

  structurizr:
    image: structurizr/lite
    ports:
      - "8082:8080"
    volumes:
      - ./structurizr:/usr/local/structurizr
    networks:
      - happyheadlines-net

volumes:
  article-db-africa-data:
  article-db-antarctica-data:
  article-db-asia-data:
  article-db-europe-data:
  article-db-north-america-data:
  article-db-south-america-data:
  article-db-oceania-data:
  article-db-global-data:
  profanity-db-data:
  comment-db-data:
  draft-db-data:
  subscriber-db-data:
  seq-data:

networks:
  happyheadlines-net:
    driver: bridge
